<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EdgeClaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Status indicator -->
  <div class="status-section">
    <div class="orb-wrap">
      <div class="orb" id="orb">
        <div class="orb-inner"></div>
      </div>
      <div class="orb-ring" id="orbRing"></div>
    </div>
    <div class="status-text" id="statusText">IDLE</div>
    <div class="status-sub" id="statusSub">Ready</div>
  </div>

  <!-- Subtitle / transcript area -->
  <div class="transcript-section">
    <div class="transcript" id="transcript"></div>
  </div>

  <!-- Bottom area: camera + hints -->
  <div class="bottom-section">
    <div class="bottom-left">
      <div class="cam-container" id="camContainer">
        <video id="cam" autoplay playsinline muted></video>
        <button class="cam-toggle" id="camToggle" title="Toggle camera">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 1l22 22M21 21H3a2 2 0 01-2-2V8a2 2 0 012-2h3m3-3h6l2 3h4a2 2 0 012 2v9.34"/>
          </svg>
        </button>
      </div>
      <div class="system-dots">
        <span class="sys-dot" id="dotS1"></span>
        <span class="sys-label">S1</span>
        <span class="sys-dot" id="dotS2"></span>
        <span class="sys-label">S2</span>
      </div>
    </div>
    <div class="bottom-right">
      <div class="hints" id="hints"></div>
    </div>
  </div>

  <!-- Mic control -->
  <div class="mic-section">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg class="mic-icon" id="micIcon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <svg class="stop-icon hidden" id="stopIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
    <button class="reset-btn" id="resetBtn" onclick="resetCtx()" title="Reset context">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
